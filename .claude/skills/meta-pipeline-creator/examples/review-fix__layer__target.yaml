tasks:
  - type: script
    command: rm -f .claude/tmp/review-fix-layer-target-reviewer

  - type: agent
    name: review-fix-layer-target-reviewer
    task: |
      target_path: src/layer/target.ts
      ng_output_path: .claude/tmp/review-fix-layer-target-reviewer
    procedure: arch/review
    model: sonnet
    allowed_tools:
      - Read
      - Bash
      - mcp__perclst__ts_analyze
      - mcp__perclst__ts_get_references
      - mcp__perclst__ts_get_types

  - type: pipeline
    name: review-fix-layer-target-fix-loop
    tasks:
      - type: agent
        name: review-fix-layer-target-implementer
        task: |
          target_path: src/layer/target.ts
          ng_output_path: .claude/tmp/review-fix-layer-target-reviewer

          If ng_output_path does not exist, there are no issues to fix — exit immediately.
        procedure: arch/refactor
        model: sonnet
        allowed_tools:
          - Read
          - Write
          - Edit
          - Bash
          - mcp__perclst__ts_analyze
          - mcp__perclst__ts_get_references
          - mcp__perclst__ts_checker

      - type: agent
        name: review-fix-layer-target-reviewer
        task: |
          Re-review src/layer/target.ts for remaining violations.
          ng_output_path: .claude/tmp/review-fix-layer-target-reviewer
          If the code is now clean, exit without writing to ng_output_path.
        model: sonnet
        allowed_tools:
          - Read
          - Bash
          - mcp__perclst__ts_analyze
          - mcp__perclst__ts_get_references
          - mcp__perclst__ts_get_types
        rejected:
          to: review-fix-layer-target-implementer
          max_retries: 3

      - type: script
        command: npm run build && npm run test:unit
        rejected:
          to: review-fix-layer-target-implementer
          max_retries: 3

  - type: agent
    name: review-fix-layer-target-implementer
    task: Code is clean and tests pass. Commit the changes with an appropriate conventional commit message (e.g. refactor(layer): ...).
    model: haiku
    allowed_tools:
      - Read
      - Bash
