tasks:
  - type: script
    command: rm -f .claude/tmp/mcp-integ-askPermission-reviewer
      .claude/tmp/mcp-integ-gitPendingChanges-reviewer
      .claude/tmp/mcp-integ-knowledgeSearch-reviewer
      .claude/tmp/mcp-integ-tsAnalyze-reviewer
      .claude/tmp/mcp-integ-tsCallGraph-reviewer
      .claude/tmp/mcp-integ-tsChecker-reviewer
      .claude/tmp/mcp-integ-tsGetReferences-reviewer
      .claude/tmp/mcp-integ-tsGetTypes-reviewer
      .claude/tmp/mcp-integ-tsTestStrategist-reviewer
    done: true
  - type: agent
    name: mcp-integ-askPermission-implementer
    task: >
      target_tool: askPermission

      test_cases:
        - happy path: service approves request → content[0].text contains approval JSON
        - happy path: service denies request → content[0].text contains denial JSON
        - error: service throws → exception propagates

      mock_boundary: PermissionPipeService が使う Unix socket（外部 I/O のみ）
    procedure: test-integration/implement
    model: sonnet
    allowed_tools:
      - Read
      - Write
      - Edit
      - Bash
      - mcp__perclst__ts_checker
    done: true
  - type: agent
    name: mcp-integ-askPermission-reviewer
    task: >
      target_path:
      src/mcp/tools/__tests__/integration/askPermission.integration.test.ts

      ng_output_path: .claude/tmp/mcp-integ-askPermission-reviewer
    procedure: arch/review
    model: sonnet
    allowed_tools:
      - Read
      - Bash
      - mcp__perclst__ts_analyze
      - mcp__perclst__ts_get_references
      - mcp__perclst__ts_get_types
      - mcp__perclst__ts_checker
    rejected:
      to: mcp-integ-askPermission-implementer
      max_retries: 3
    done: true
  - type: script
    command: npm run lint --fix && npm run build && npx tsc --noEmit 2>&1 && npm run
      test:unit
    rejected:
      to: mcp-integ-askPermission-implementer
      max_retries: 3
    done: true
  - type: agent
    name: mcp-integ-askPermission-implementer
    task: "askPermission.integration.test.ts is implemented, reviewed, and verified.
      Commit with a conventional commit message (e.g. test(mcp): add integration
      test for askPermission tool)."
    model: haiku
    allowed_tools:
      - Read
      - Bash
    done: true
  - type: agent
    name: mcp-integ-gitPendingChanges-implementer
    task: >
      target_tool: gitPendingChanges

      test_cases:
        - happy path: staged + unstaged changes exist → content[0].text lists changed files
